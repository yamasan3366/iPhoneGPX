<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hiking Tracker Pro</title>
    <base href="./" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body style="margin:0; padding:0; background-color:#ffffff; overflow:hidden;">
    <div id="app">読み込み中...</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let map, userMarker, currentWalkPolyline;
        let watchId = null;
        let lastLat = null, lastLon = null;
        window.isHeadUpInternal = false;

        window.initMap = () => {
            if (map) return;
            // 標準コントロールをすべて無効化して初期化
            map = L.map('map', {
                zoomControl: false,
                attributionControl: true,
                center: [35.68, 139.76],
                zoom: 13
            });

            const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '国土地理院' });
            const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '写真' });
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });

            std.addTo(map);

            // レイヤー切替も独自ボタンから呼び出すため、各レイヤーを保持
            window.mapLayers = { "std": std, "photo": photo, "osm": osm };
            window.currentLayer = std;

            userMarker = L.circleMarker([0, 0], { radius: 8, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 2 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 500);
        };

        // 自作コントロール用関数
        window.mapZoomIn = () => map.zoomIn();
        window.mapZoomOut = () => map.zoomOut();
        window.switchLayer = (key) => {
            map.removeLayer(window.currentLayer);
            window.currentLayer = window.mapLayers[key];
            window.currentLayer.addTo(map);
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        let wakeLock = null;
        window.isRecordingInternal = false;

        // 復帰時にGPSを強制再起動するイベント
        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible' && window.isRecordingInternal) {
                console.log("Safari復帰：GPS監視をリセットします");
                // 一旦止めてから再開
                if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                startGPS();
            }
        });

        let audioContext = null;
        let silenceSource = null;

        // 無音のオーディオ信号を生成する関数
        function playSilence() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            // 1秒間の無音バッファを作成
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate, audioContext.sampleRate);
            silenceSource = audioContext.createBufferSource();
            silenceSource.buffer = buffer;
            silenceSource.loop = true; // ループ再生
            silenceSource.connect(audioContext.destination);
            silenceSource.start();
            console.log("無音ハック：再生開始");
        }

        function stopSilence() {
            if (silenceSource) {
                silenceSource.stop();
                silenceSource = null;
                console.log("無音ハック：停止");
            }
        }

        // 既存の開始・停止関数に組み込む
        window.startTracking = async (dotNetObj) => {
            window.dotNetObj = dotNetObj;
            window.isRecordingInternal = true;

            // iOSではユーザー操作（ボタンクリック等）のコールバック内で
            // オーディオを開始する必要があるため、ここで呼び出す
            playSilence();

            // WakeLock（画面点灯維持）も併用
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.error("WakeLock failed"); }

            startGPS();
        };

        window.stopTracking = () => {
            window.isRecordingInternal = false;
            stopSilence(); // 停止
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        };

        // GPS監視本体の切り出し
        function startGPS() {
            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, altitude: ele } = pos.coords;

                // 地図とマーカーを更新
                map.setView([lat, lon]);
                userMarker.setLatLng([lat, lon]);
                if (currentWalkPolyline) currentWalkPolyline.addLatLng([lat, lon]);

                window.dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele: ele || 0 });
            }, (err) => {
                console.warn("GPS Watch Error:", err.message);
            }, {
                enableHighAccuracy: true,
                timeout: 10000, // 登山用なので少し長めに待つ
                maximumAge: 0
            });
        }


        window.showCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                map.setView(loc, 15);
                userMarker.setLatLng(loc);
            }, null, { enableHighAccuracy: true });
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };


        window.drawTrack = (pts) => {
            if (!pts || pts.length === 0) return;
            map.eachLayer(layer => { if (layer instanceof L.Polyline && layer.options.color === 'red') map.removeLayer(layer); });
            const latlngs = pts.map(p => [p.lat, p.lon]);
            const route = L.polyline(latlngs, { color: 'red', weight: 4 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); map.fitBounds(route.getBounds(), { padding: [40, 40] }); }, 200);
        };

        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 5000);
        };

        window.requestDeviceOrientation = async () => {
            // 診断用
            console.log("requestDeviceOrientation 呼び出し成功");

            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {

                try {
                    // ここでポップアップが出るはず
                    const permission = await DeviceOrientationEvent.requestPermission();
                    alert("許可ステータス: " + permission); // 診断用
                    return permission === 'granted';
                } catch (error) {
                    alert("エラー発生: " + error);
                    return false;
                }
            } else {
                alert("このブラウザは requestPermission に対応していません（Android等）");
                return true;
            }
        };


        window.startOrientationListener = () => {
            window.addEventListener('deviceorientationabsolute', (event) => {
                let heading = event.alpha; // 北を0とした角度
                if (event.webkitCompassHeading) {
                    heading = event.webkitCompassHeading; // iOS用の方位角
                }
                if (heading !== undefined && window.isHeadUp) {
                    // 地図を回転させる（ Leafletのコンテナを回転 ）
                    document.getElementById('map').style.transform = `rotate(${-heading}deg)`;
                }
            }, true);
        };

        let isHeadUpActive = false;
        let lastHeading = 0;
        let animationFrameId = null;

        let isHeadUpActive = false;
        let lastHeading = 0;

        // 地図の向き（ヘッドアップ）トグル
        async function directRequestPermission() {
            if (isHeadUpActive) {
                resetMapRotation();
                return;
            }
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    isHeadUpActive = true;
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
            } else {
                isHeadUpActive = true;
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        }

        function handleOrientation(event) {
            if (!isHeadUpActive) return;
            let targetHeading = event.webkitCompassHeading || (360 - (event.alpha || 0));
            let diff = targetHeading - lastHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            lastHeading = lastHeading + (diff * 0.08); // 0.08: さらに少しマイルドに
            const mapElement = document.getElementById('map');
            if (mapElement) {
                mapElement.style.transform = `rotate(${-lastHeading}deg) scale(1.6)`;
            }
        }

        function resetMapRotation() {
            isHeadUpActive = false;
            window.removeEventListener('deviceorientation', handleOrientation);
            const mapElement = document.getElementById('map');
            if (mapElement) {
                mapElement.style.transform = `rotate(0deg) scale(1.0)`;
            }
        }


        window.startOrientationListener = () => {
            // 既にリスナーがある場合は二重登録を防ぐ
            window.removeEventListener('deviceorientationabsolute', handleOrientation);
            window.removeEventListener('deviceorientation', handleOrientation);

            // iOS用のコンパスイベント
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else if ('ondeviceorientation' in window) {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
        };


    </script>
</body>
</html>
