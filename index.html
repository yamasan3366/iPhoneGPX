<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hiking Tracker Pro</title>
    <base href="./" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body style="margin:0; padding:0; background-color:#ffffff; overflow:hidden;">
    <div id="app">読み込み中...</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let map, userMarker, currentWalkPolyline;
        let watchId = null;
        let lastLat = null, lastLon = null;
        window.isHeadUpInternal = false;

        window.initMap = () => {
            if (map) return;
            // 標準コントロールをすべて無効化して初期化
            map = L.map('map', {
                zoomControl: false,
                attributionControl: true,
                center: [35.68, 139.76],
                zoom: 13
            });

            const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '国土地理院' });
            const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '写真' });
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });

            std.addTo(map);

            // レイヤー切替も独自ボタンから呼び出すため、各レイヤーを保持
            window.mapLayers = { "std": std, "photo": photo, "osm": osm };
            window.currentLayer = std;

            userMarker = L.circleMarker([0, 0], { radius: 8, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 2 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 500);
        };

        // 自作コントロール用関数
        window.mapZoomIn = () => map.zoomIn();
        window.mapZoomOut = () => map.zoomOut();
        window.switchLayer = (key) => {
            map.removeLayer(window.currentLayer);
            window.currentLayer = window.mapLayers[key];
            window.currentLayer.addTo(map);
        };



        let lastCompassHeading = 0;

        // 【新規】iOSのセンサー許可を求め、コンパス連動を開始する関数
        async function directRequestPermission() {
            // すでにONの場合は、OFF（ノースアップ）にリセットして終了
            if (window.isHeadUpInternal) {
                window.setHeadingMode(false);
                return;
            }

            // iOS 13+ のための権限リクエスト
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        activateHeading(true);
                    }
                } catch (e) { console.error("センサーアクセスエラー:", e); }
            } else {
                // AndroidやPC、古いiOSの場合
                activateHeading(true);
            }
        }

        // 回転処理を有効化する内部関数
        function activateHeading(isEnable) {
            window.setHeadingMode(isEnable);
            if (isEnable) {
                window.addEventListener('deviceorientation', handleCompass, true);
            } else {
                window.removeEventListener('deviceorientation', handleCompass);
            }
        }

        let lastCompassHeading = 0;
        let isHeadUpRunning = false; // 内部的なフラグ

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            const mapElement = document.getElementById('map');

            if (!isHeadUp) {
                // 【重要】ノースアップ復帰：回転と拡大を完全に消し、アニメーションを一度無効化してリセット
                isHeadUpRunning = false;
                window.removeEventListener('deviceorientation', handleCompass);
                if (mapElement) {
                    mapElement.style.transition = "transform 0.5s ease-out"; // 戻る時は少しゆっくり
                    mapElement.style.transform = "rotate(0deg) scale(1.0)";
                }
            } else {
                isHeadUpRunning = true;
            }
        };

        function handleCompass(event) {
            if (!window.isHeadUpInternal || !isHeadUpRunning) return;

            let heading = event.webkitCompassHeading || (360 - (event.alpha || 0));

            let diff = heading - lastCompassHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;

            // 【震え対策：デッドゾーン】
            // 0.5度以下の微細な変化は「震え」とみなして無視する
            if (Math.abs(diff) < 0.5) return;

            // 【ヌルっと動かす】
            // 係数を 0.2 程度に上げ、反応を少し速めつつ収束を早めます
            lastCompassHeading = lastCompassHeading + (diff * 0.2);

            const mapElement = document.getElementById('map');
            if (mapElement) {
                // scaleは1.6（余白対策）
                mapElement.style.transition = "transform 0.1s linear"; // 動いている間はリニア
                mapElement.style.transform = `rotate(${-lastCompassHeading}deg) scale(1.6)`;
            }
        }

        window.startTracking = (dotNetObj) => {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (!currentWalkPolyline) currentWalkPolyline = L.polyline([], { color: 'blue', weight: 6 }).addTo(map);

            // startTracking 内の回転ロジック
            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, altitude: ele } = pos.coords;

                //if (window.isHeadUpInternal && lastLat !== null) {
                //    const r = Math.PI / 180;
                //    const dLon = (lon - lastLon) * r;
                //    const y = Math.sin(dLon) * Math.cos(lat * r);
                //    const x = Math.cos(lastLat * r) * Math.sin(lat * r) - Math.sin(lastLat * r) * Math.cos(lat * r) * Math.cos(dLon);
                //    const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                //    // 精度誤差による小刻みな回転を防ぐ
                //    if (Math.abs(lat - lastLat) > 0.00005 || Math.abs(lon - lastLon) > 0.00005) {
                //        const mapElement = document.getElementById('map');
                //        if (mapElement) {
                //            // map.setBearing の代わりに CSS で回転・拡大
                //            mapElement.style.transform = `rotate(${-bearing}deg) scale(1.6)`;
                //        }
                //    }
                //}

                map.setView([lat, lon]);
                userMarker.setLatLng([lat, lon]);
                currentWalkPolyline.addLatLng([lat, lon]);
                lastLat = lat; lastLon = lon;
                dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele: ele || 0 });
            }, null, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        };

        window.showCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                map.setView(loc, 15);
                userMarker.setLatLng(loc);
            }, null, { enableHighAccuracy: true });
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        window.stopTracking = () => {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        };

        window.drawTrack = (pts) => {
            if (!pts || pts.length === 0) return;
            map.eachLayer(layer => { if (layer instanceof L.Polyline && layer.options.color === 'red') map.removeLayer(layer); });
            const latlngs = pts.map(p => [p.lat, p.lon]);
            const route = L.polyline(latlngs, { color: 'red', weight: 4 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); map.fitBounds(route.getBounds(), { padding: [40, 40] }); }, 200);
        };

        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 5000);
        };
    </script>
</body>
</html>
