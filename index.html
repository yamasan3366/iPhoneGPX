<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>GPX Tracker</title>
    <base href="./" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">読み込み中...</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let map, userMarker, currentWalkPolyline;
        let watchId = null;
        let lastLat = null, lastLon = null;
        window.isHeadUpInternal = false;

        window.initMap = () => {
            if (map) return;
            // ズームボタン(zoomControl)とレイヤーボタンを有効化
            map = L.map('map', { zoomControl: true, center: [35.68, 139.76], zoom: 13 });
            const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '国土地理院' });
            const topo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', { attribution: '淡色地図' });
            std.addTo(map);
            L.control.layers({ "標準地図": std, "淡色地図": topo }).addTo(map);
            userMarker = L.circleMarker([0, 0], { radius: 10, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        window.startTracking = (dotNetObj) => {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (!currentWalkPolyline) currentWalkPolyline = L.polyline([], { color: 'blue', weight: 6 }).addTo(map);

            // スリープ対策：高精度・有効期限0で継続的な要求を出す
            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, altitude: ele } = pos.coords;

                if (window.isHeadUpInternal && lastLat !== null) {
                    const r = Math.PI / 180;
                    const y = Math.sin((lon - lastLon) * r) * Math.cos(lat * r);
                    const x = Math.cos(lastLat * r) * Math.sin(lat * r) - Math.sin(lastLat * r) * Math.cos(lat * r) * Math.cos((lon - lastLon) * r);
                    const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
                    if (Math.abs(lat - lastLat) > 0.00001) map.setBearing(bearing);
                }

                map.setView([lat, lon]);
                userMarker.setLatLng([lat, lon]);
                currentWalkPolyline.addLatLng([lat, lon]);
                lastLat = lat; lastLon = lon;
                dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele: ele || 0 });
            }, err => console.error(err), { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        };

        window.stopTracking = () => {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        };

        window.drawTrack = (pts) => {
            const latlngs = pts.map(p => [p.lat, p.lon]);
            L.polyline(latlngs, { color: 'red', weight: 4 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); map.fitBounds(latlngs, { padding: [40, 40] }); }, 200);
        };

        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        };
    </script>
</body>
</html>
