<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hiking Tracker Pro</title>
    <base href="./" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body style="margin:0; padding:0; background-color:#ffffff; overflow:hidden;">
    <div id="app">読み込み中...</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let map, userMarker, currentWalkPolyline;
        let watchId = null;
        let lastLat = null, lastLon = null;
        window.isHeadUpInternal = false;

        window.initMap = () => {
            if (map) return;
            // ズームボタンは自作するので false に設定
            map = L.map('map', { zoomControl: false, center: [35.68, 139.76], zoom: 13 });

            // レイヤー定義
            const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '国土地理院' });
            const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '国土地理院(写真)' });
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });

            std.addTo(map); // デフォルト
            L.control.layers({ "標準地図": std, "空中写真": photo, "OpenStreetMap": osm }).addTo(map);

            userMarker = L.circleMarker([0, 0], { radius: 10, color: 'white', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 500);
        };

        // 自作ズーム機能
        window.mapZoomIn = () => map.zoomIn();
        window.mapZoomOut = () => map.zoomOut();

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        window.startTracking = (dotNetObj) => {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (!currentWalkPolyline) currentWalkPolyline = L.polyline([], { color: 'blue', weight: 6 }).addTo(map);

            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, altitude: ele } = pos.coords;

                // ヘッドアップ（移動方向に基づく回転）
                if (window.isHeadUpInternal && lastLat !== null) {
                    const r = Math.PI / 180;
                    const dLon = (lon - lastLon) * r;
                    const y = Math.sin(dLon) * Math.cos(lat * r);
                    const x = Math.cos(lastLat * r) * Math.sin(lat * r) - Math.sin(lastLat * r) * Math.cos(lat * r) * Math.cos(dLon);
                    const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                    // 精度誤差による小刻みな回転を防ぐ（約5m以上の移動で回転）
                    if (Math.abs(lat - lastLat) > 0.00005 || Math.abs(lon - lastLon) > 0.00005) {
                        map.setBearing(bearing);
                    }
                }

                map.setView([lat, lon]);
                userMarker.setLatLng([lat, lon]);
                currentWalkPolyline.addLatLng([lat, lon]);
                lastLat = lat; lastLon = lon;
                dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele: ele || 0 });
            }, null, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        };

        window.showCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                map.setView(loc, 15);
                userMarker.setLatLng(loc);
            }, null, { enableHighAccuracy: true });
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        //window.startTracking = (dotNetObj) => {
        //    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        //    if (!currentWalkPolyline) currentWalkPolyline = L.polyline([], { color: 'blue', weight: 6 }).addTo(map);

        //    // スリープ中断対策：高精度・有効期限0を維持
        //    watchId = navigator.geolocation.watchPosition(pos => {
        //        const lat = pos.coords.latitude;
        //        const lon = pos.coords.longitude;
        //        const ele = pos.coords.altitude || 0;

        //        if (window.isHeadUpInternal && lastLat !== null) {
        //            const r = Math.PI / 180;
        //            const dLon = (lon - lastLon) * r;
        //            const y = Math.sin(dLon) * Math.cos(lat * r);
        //            const x = Math.cos(lastLat * r) * Math.sin(lat * r) - Math.sin(lastLat * r) * Math.cos(lat * r) * Math.cos(dLon);
        //            const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        //            if (Math.abs(lat - lastLat) > 0.00001) map.setBearing(bearing);
        //        }

        //        map.setView([lat, lon]);
        //        userMarker.setLatLng([lat, lon]);
        //        currentWalkPolyline.addLatLng([lat, lon]);
        //        lastLat = lat; lastLon = lon;
        //        dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele });
        //    }, null, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        //};

        window.stopTracking = () => {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        };

        window.drawTrack = (pts) => {
            if (!pts || pts.length === 0) return;
            map.eachLayer(layer => { if (layer instanceof L.Polyline && layer.options.color === 'red') map.removeLayer(layer); });
            const latlngs = pts.map(p => [p.lat, p.lon]);
            const route = L.polyline(latlngs, { color: 'red', weight: 4 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); map.fitBounds(route.getBounds(), { padding: [40, 40] }); }, 200);
        };

        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 5000);
        };
    </script>
</body>
</html>
