<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hiking Tracker Pro</title>
    <base href="./" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body style="margin:0; padding:0; background-color:#ffffff; overflow:hidden;">
    <div id="app">読み込み中...</div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        let map = null;
        let userMarker, currentWalkPolyline;
        let watchId = null;
        let lastLat = null, lastLon = null;
        window.isHeadUpInternal = false;

        window.initMap = () => {
            const mapDiv = document.getElementById('map');
            if (!mapDiv) return; // 要素がなければ何もしない

            // すでにLeafletが初期化済み（クラスが付与されている）なら再利用する
            if (mapDiv.classList.contains('leaflet-container')) {
                setTimeout(() => { map.invalidateSize(); }, 100);
                return;
            }

            // 初回初期化
            map = L.map('map', {
                zoomControl: false,
                attributionControl: true,
                center: [35.68, 139.76],
                zoom: 13
            });

            const std = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { attribution: '国土地理院' }).addTo(map);
            const photo = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { attribution: '写真' });
            const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' });

            window.mapLayers = { "std": std, "photo": photo, "osm": osm };
            window.currentLayer = std;

            // 【新】 CSSで三角形を作る DivIcon を定義して追加
            const locationIcon = L.divIcon({
                className: 'user-location-marker', // CSSでスタイルを定義
                iconSize: [24, 24], // アイコンの大きさ
                iconAnchor: [12, 12] // 中心点を合わせる
            });

            userMarker = L.marker([0, 0], { icon: triangleIcon, zIndexOffset: 1000 }).addTo(map);

        //    // 【重要】SVG要素として三角形を直接作る（確実に表示するため）
        //    const trianglePoints = "0,10 -8,25 8,25"; // 三角形の頂点座標
        //    userMarker.options.setRotationAngle = 0; // カスタムプロパティ

        //    // 描画を強制確定
        //    setTimeout(() => { map.invalidateSize(); }, 200);
        };

        // 回転とリセットの関数（ここをシンプルに統合します）
        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            const mapElement = document.getElementById('map');
            if (!mapElement) return;

            if (!isHeadUp) {
                window.removeEventListener('deviceorientation', handleCompass);
                mapElement.style.transition = "transform 0.4s ease-out";
                mapElement.style.transform = "rotate(0deg) scale(1.0)";
            } else {
                // 回転開始
                window.addEventListener('deviceorientation', handleCompass, true);
                mapElement.style.transform = "scale(1.6)";
            }
        };

        async function directRequestPermission() {
            // 1. まず現在のチェック状態を確認
            const chk = document.getElementById('heading-check');
            if (!chk) return;

            // 2. オフになったなら、回転を止めて北に戻す
            if (!chk.checked) {
                window.isHeadUpInternal = false;
                window.removeEventListener('deviceorientation', handleCompass);
                const mapElement = document.getElementById('map');
                if (mapElement) {
                    mapElement.style.transition = "transform 0.4s ease-out";
                    mapElement.style.transform = "rotate(0deg) scale(1.0)";
                }
                return;
            }

            // 3. オンになったなら、回転を開始する
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iPhoneの場合
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') {
                    setupRotation();
                } else {
                    chk.checked = false;
                }
            } else {
                // Android/PCの場合
                setupRotation();
            }
        }

        // 回転のセットアップ
        function setupRotation() {
            window.isHeadUpInternal = true;
            // ここでセンサーの監視をスタートさせる（これが重要！）
            window.addEventListener('deviceorientation', handleCompass, true);

            const mapElement = document.getElementById('map');
            if (mapElement) {
                mapElement.style.transition = "none"; // 回転中はスムーズに動かすため transition を切る
                mapElement.style.transform = "scale(1.6)";
            }
        }

        // 【共通化】回転を開始する処理を一箇所にまとめる
        function startRotation() {
            window.isHeadUpInternal = true;
            window.addEventListener('deviceorientation', handleCompass, true);
            const mapElement = document.getElementById('map');
            if (mapElement) {
                mapElement.style.transform = "scale(1.6)";
            }
        }


        function startHeadingMode() {
            window.isHeadUpInternal = true;
            window.addEventListener('deviceorientation', handleCompass, true);
            const mapElement = document.getElementById('map');
            if (mapElement) {
                mapElement.style.transform = "scale(1.6)"; // 先に拡大しておく
            }
        }


        // 回転処理を有効化する内部関数
        function activateHeading(isEnable) {
            window.setHeadingMode(isEnable);
            if (isEnable) {
                window.addEventListener('deviceorientation', handleCompass, true);
            } else {
                window.removeEventListener('deviceorientation', handleCompass);
            }
        }

        let lastCompassHeading = 0;
        let isHeadUpRunning = false; // 内部的なフラグ


        // 磁気センサーで地図を回す
        // 2. handleCompass は「地図を回すだけ」にします
        function handleCompass(event) {
            if (!window.isHeadUpInternal) return;

            let heading = event.webkitCompassHeading || (360 - (event.alpha || 0));

            // スムーズな数値計算のみ
            if (typeof window.lastCompassHeading === 'undefined') window.lastCompassHeading = heading;
            let diff = heading - window.lastCompassHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            window.lastCompassHeading = window.lastCompassHeading + (diff * 0.2);

            const mapElement = document.getElementById('map');
            if (mapElement) {
                // 地図全体を回転させる
                mapElement.style.transform = `rotate(${-window.lastCompassHeading}deg) scale(1.6)`;
            }
            // ★マーカーを個別に JS で回す処理は、バグの原因なので削除しました
        }

        window.startTracking = (dotNetObj) => {
            if (watchId !== null) navigator.geolocation.clearWatch(watchId);
            if (!currentWalkPolyline) currentWalkPolyline = L.polyline([], { color: 'blue', weight: 6 }).addTo(map);

            // startTracking 内の回転ロジック
            watchId = navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lon, altitude: ele } = pos.coords;
                map.setView([lat, lon]);
                userMarker.setLatLng([lat, lon]);
                currentWalkPolyline.addLatLng([lat, lon]);
                lastLat = lat; lastLon = lon;
                dotNetObj.invokeMethodAsync('OnLocationUpdated', { lat, lon, ele: ele || 0 });
            }, null, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        };

        window.showCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition(pos => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                map.setView(loc, 15);
                userMarker.setLatLng(loc);
            }, null, { enableHighAccuracy: true });
        };

        window.setHeadingMode = (isHeadUp) => {
            window.isHeadUpInternal = isHeadUp;
            if (!isHeadUp) map.setBearing(0);
        };

        window.stopTracking = () => {
            if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
        };

        window.drawTrack = (pts) => {
            if (!pts || pts.length === 0) return;
            map.eachLayer(layer => { if (layer instanceof L.Polyline && layer.options.color === 'red') map.removeLayer(layer); });
            const latlngs = pts.map(p => [p.lat, p.lon]);
            const route = L.polyline(latlngs, { color: 'red', weight: 4 }).addTo(map);
            setTimeout(() => { map.invalidateSize(); map.fitBounds(route.getBounds(), { padding: [40, 40] }); }, 200);
        };

        window.downloadFile = (fileName, content) => {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 5000);
        };
    </script>
</body>
</html>
